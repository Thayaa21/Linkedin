name: Poll LinkedIn Connections
on:
  schedule:
    - cron: '0 */6 * * *'    # Poll every 6 hours
    - cron: '0 16 * * *'     # Send at 9 AM MST daily (incl weekends)
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.49.0-noble
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDS_JSON }}' | base64 -d > google_creds.json
          echo '${{ secrets.LINKEDIN_COOKIES }}' | base64 -d > linkedin_cookies.json
          echo '${{ secrets.CONNECTIONS_SNAPSHOT }}' > connections_snapshot.json

      - name: Run poll
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_TAB: ${{ secrets.SHEET_TAB }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_CREDS_FILE: google_creds.json
          COOKIES_FILE: linkedin_cookies.json
          CONNECTIONS_SNAPSHOT: connections_snapshot.json
        run: python -c "import asyncio; from main import poll_connections; asyncio.run(poll_connections())"

      - name: Run send
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_TAB: ${{ secrets.SHEET_TAB }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_CREDS_FILE: google_creds.json
          COOKIES_FILE: linkedin_cookies.json
        run: python -c "import asyncio; from main import send_messages; asyncio.run(send_messages())"